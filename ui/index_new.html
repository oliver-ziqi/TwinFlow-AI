<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Industrial Agentic System - New Frontend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #050910;
      --panel: #0d1628;
      --panel-2: #111d35;
      --line: rgba(0, 212, 255, 0.15);
      --line-strong: rgba(0, 212, 255, 0.35);
      --text: #e8f4fd;
      --muted: #7a9bbf;
      --cyan: #00d4ff;
      --green: #00ff88;
      --amber: #ffb700;
      --red: #ff4b65;
      --sidebar-w: 260px;
      --chat-w: 420px;
      --header-h: 52px;
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body {
      background: radial-gradient(circle at 10% 10%, #0b1322 0%, var(--bg) 45%, #03060b 100%);
      color: var(--text);
      font-family: "JetBrains Mono", monospace;
      overflow: hidden;
    }
    .root {
      height: 100%;
      display: grid;
      grid-template-rows: var(--header-h) 1fr;
    }
    .header {
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      background: #08101d;
    }
    .logo {
      font-family: "Orbitron", sans-serif;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .14em;
    }
    .logo span { color: var(--cyan); }
    .header-status { margin-left: auto; font-size: 11px; color: var(--muted); }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr var(--chat-w);
    }
    .sidebar {
      border-right: 1px solid var(--line);
      background: #091120;
      overflow-y: auto;
      padding-bottom: 12px;
    }
    .section {
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }
    .section h4 {
      margin: 0 0 10px;
      font-size: 11px;
      color: var(--cyan);
      font-family: "Orbitron", sans-serif;
      letter-spacing: .09em;
      text-transform: uppercase;
    }
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .btn {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(0, 212, 255, 0.08);
      color: var(--text);
      font-size: 11px;
      padding: 8px 10px;
      cursor: pointer;
      text-align: left;
    }
    .btn:hover { border-color: var(--line-strong); }
    .btn.danger { background: rgba(255, 75, 101, 0.12); }
    .btn.success { background: rgba(0, 255, 136, 0.12); }
    .line { font-size: 10px; color: var(--muted); margin: 6px 0; }
    .log-box {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.2);
      padding: 8px;
      font-size: 10px;
      white-space: pre-wrap;
      max-height: 140px;
      overflow: auto;
    }
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px; font-size: 11px; color: var(--muted);
    }

    .center {
      min-height: 0;
      display: grid;
      grid-template-rows: 38px 1fr;
      background: var(--bg);
    }
    .tab-bar {
      display: flex; align-items: center;
      border-bottom: 1px solid var(--line);
      background: #08101d;
      padding: 0 12px;
      gap: 2px;
    }
    .tab {
      border: 0; background: transparent; color: var(--muted);
      font-size: 11px; font-family: inherit; padding: 10px 14px;
      border-bottom: 2px solid transparent; cursor: pointer;
    }
    .tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }
    .view { min-height: 0; display: none; }
    .view.active { display: block; height: 100%; }

    .live-grid {
      min-height: 0;
      height: 100%;
      display: grid;
      grid-template-rows: 2fr 1fr;
      gap: 10px;
      padding: 10px;
    }
    .card {
      min-height: 0;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
      border-radius: 10px;
      overflow: hidden;
    }
    .card-head {
      height: 38px;
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center;
      padding: 0 12px;
      font-family: "Orbitron", sans-serif;
      font-size: 11px;
      letter-spacing: .08em;
      color: var(--cyan);
      text-transform: uppercase;
    }
    .head-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
    .head-right select {
      border: 1px solid var(--line);
      border-radius: 5px;
      background: rgba(0, 0, 0, .18);
      color: var(--text);
      font-size: 10px;
      padding: 4px 6px;
      font-family: inherit;
    }
    .twin-wrap { height: calc(100% - 38px); }
    .twin-wrap iframe { width: 100%; height: 100%; border: 0; display: block; }
    .chart-wrap {
      height: calc(100% - 38px);
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 8px;
      padding: 10px;
    }
    #inventoryChart { width: 100%; height: 100%; }
    .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .metric {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(0, 0, 0, .2);
      padding: 8px;
    }
    .metric .k { font-size: 10px; color: var(--muted); }
    .metric .v { font-size: 18px; color: var(--green); font-weight: 600; margin-top: 3px; }

    .tasks-wrap { padding: 10px; overflow: auto; height: 100%; }
    .task-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(0, 0, 0, .2);
      padding: 10px;
      margin-bottom: 8px;
      font-size: 11px;
    }
    .task-title { color: var(--text); font-weight: 600; margin-bottom: 4px; }
    .task-meta { color: var(--muted); margin-bottom: 6px; }
    .task-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

    .chat {
      min-height: 0;
      border-left: 1px solid var(--line);
      background: #091120;
      display: grid;
      grid-template-rows: 38px 1fr auto auto;
    }
    .chat-title {
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center;
      padding: 0 12px;
      font-family: "Orbitron", sans-serif;
      font-size: 11px; color: var(--cyan); letter-spacing: .08em; text-transform: uppercase;
    }
    .chat-list {
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat-empty {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #9ec2df;
      font-weight: 700;
      font-size: 14px;
      line-height: 1.7;
      padding: 16px;
    }
    .chat-empty code {
      display: inline-block;
      max-width: 100%;
      margin-top: 6px;
      padding: 4px 8px;
      border: 1px solid rgba(0, 212, 255, 0.25);
      border-radius: 6px;
      background: rgba(0, 212, 255, 0.08);
      color: #bfe8ff;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
      font-size: 12px;
    }
    .msg {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .msg.user { border-color: rgba(255, 183, 0, .3); background: rgba(255, 183, 0, .06); }
    .msg.ai { border-color: rgba(0, 212, 255, .25); background: rgba(0, 212, 255, .06); }
    .pending {
      margin: 0 10px 8px;
      border: 1px solid rgba(255, 183, 0, .35);
      border-radius: 6px;
      background: rgba(255, 183, 0, .08);
      padding: 8px;
      font-size: 11px;
      display: none;
    }
    .pending.visible { display: block; }
    .pending-actions {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px;
    }
    .chat-input {
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1fr 74px;
      gap: 8px;
      padding: 8px;
      align-items: end;
    }
    .chat-input textarea {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(0, 0, 0, .2);
      color: var(--text);
      font-size: 12px;
      padding: 10px;
      font-family: inherit;
      min-height: 44px;
      max-height: 180px;
      resize: none;
      overflow-y: auto;
      transition: min-height 0.18s ease;
    }
    .chat-input.expanded textarea {
      min-height: 132px;
    }
  </style>
</head>
<body>
  <div class="root">
    <div class="header">
      <div class="logo">Industrial <span>Agentic</span> System</div>
      <div class="header-status" id="apiStatus">API: checking...</div>
    </div>
    <div class="workspace">
      <aside class="sidebar">
        <section class="section">
          <h4>Runtime</h4>
          <div class="toggle-row">
            <label for="autoSync">Auto sync incidents (3s)</label>
            <input id="autoSync" type="checkbox" checked />
          </div>
          <button class="btn" id="clearChatBtn">Clear Chat</button>
        </section>
        <section class="section">
          <h4>Influx</h4>
          <button class="btn danger" id="purgeInfluxBtn">Delete history (4 buckets)</button>
          <div class="log-box" id="purgeOut">(ready)</div>
        </section>
        <section class="section">
          <h4>Kafka Services</h4>
          <div class="btn-grid">
            <button class="btn success" id="startWatcherBtn">Start Watcher</button>
            <button class="btn danger" id="stopWatcherBtn">Stop Watcher</button>
            <button class="btn success" id="startConsumerBtn">Start Consumer</button>
            <button class="btn danger" id="stopConsumerBtn">Stop Consumer</button>
          </div>
          <button class="btn" style="margin-top:6px" id="resetPipelineBtn">Reset Watcher/Consumer State</button>
          <div class="line" id="watcherState">Watcher: -</div>
          <div class="line" id="consumerState">Consumer: -</div>
          <details>
            <summary class="line">Kafka Logs</summary>
            <div class="log-box" id="watcherLog">(watcher)</div>
            <div class="log-box" id="consumerLog" style="margin-top:6px">(consumer)</div>
          </details>
        </section>
        <section class="section">
          <h4>Simulation</h4>
          <div class="btn-grid">
            <button class="btn success" id="startSimBtn">Start Simulation</button>
            <button class="btn danger" id="stopSimBtn">Stop Simulation</button>
          </div>
          <div class="line" id="simulationState">Simulation: -</div>
          <div class="line" id="simCfgPath">cfg: -</div>
          <div class="line" id="simJarPath">jar: -</div>
        </section>
      </aside>

      <main class="center">
        <div class="tab-bar">
          <button class="tab active" data-tab="live">Live</button>
          <button class="tab" data-tab="task">Task</button>
        </div>
        <section class="view active" id="view-live">
          <div class="live-grid">
            <article class="card">
              <div class="card-head">Digital Twin</div>
              <div class="twin-wrap">
                <iframe src="./threejs-demo/index.html" title="digital-twin"></iframe>
              </div>
            </article>
            <article class="card">
              <div class="card-head">
                Factory Inventory
                <div class="head-right">
                  <label for="rangeSelect" style="font-size:10px;color:var(--muted);text-transform:none;letter-spacing:0">window</label>
                  <select id="rangeSelect">
                    <option value="1">1m</option>
                    <option value="5" selected>5m</option>
                    <option value="15">15m</option>
                  </select>
                </div>
              </div>
              <div class="chart-wrap">
                <canvas id="inventoryChart"></canvas>
                <div class="metrics" id="metrics"></div>
              </div>
            </article>
          </div>
        </section>
        <section class="view" id="view-task">
          <div class="tasks-wrap" id="taskList"></div>
        </section>
      </main>

      <aside class="chat">
        <div class="chat-title">AI Incident Copilot</div>
        <div class="chat-list" id="chatList"></div>
        <div class="pending" id="pendingBox"></div>
        <div class="chat-input" id="chatInputWrap">
          <textarea id="chatInput" rows="1" placeholder="Enter query or event JSON..."></textarea>
          <button class="btn" id="sendBtn">Send</button>
        </div>
      </aside>
    </div>
  </div>

  <script>
    const API_BASE = window.__API_BASE__ || "http://127.0.0.1:8001";
    const chartCtx = document.getElementById("inventoryChart");
    const autoSyncCheckbox = document.getElementById("autoSync");
    const rangeSelect = document.getElementById("rangeSelect");
    let autoSyncEnabled = true;
    let lookbackMin = 5;
    let pendingBranchProposal = null;
    let chatExpanded = false;

    function formatShortTimeLabel(ts) {
      const d = new Date(ts);
      if (!Number.isFinite(d.getTime())) return String(ts || "");
      return d.toLocaleTimeString("en-GB", { hour12: false });
    }

    const chart = new Chart(chartCtx, {
      type: "line",
      data: { labels: [], datasets: [] },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        plugins: { legend: { labels: { color: "#7a9bbf" } } },
        scales: {
          x: {
            ticks: {
              color: "#7a9bbf",
              autoSkip: true,
              maxTicksLimit: 8,
              maxRotation: 0,
              minRotation: 0,
              callback: function(value) {
                const raw = this.getLabelForValue(value);
                return formatShortTimeLabel(raw);
              }
            },
            grid: { color: "rgba(0,212,255,.08)" }
          },
          y: { ticks: { color: "#7a9bbf" }, grid: { color: "rgba(0,212,255,.08)" } }
        }
      }
    });

    function addMessage(role, text) {
      const list = document.getElementById("chatList");
      if (list.querySelector(".chat-empty")) {
        list.innerHTML = "";
      }
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      list.appendChild(div);
      list.scrollTop = list.scrollHeight;
    }

    function renderChatEmptyState() {
      const list = document.getElementById("chatList");
      list.innerHTML = `
        <div class="chat-empty">
          <div>
            ✨ Ask me about incidents, root causes, or branch actions.<br/>
            🚀 Try:<br/><code>{"event":"motion_stopped","entity":"my_logistics_car1"}</code>
          </div>
        </div>
      `;
    }

    function setApiStatus(text) {
      document.getElementById("apiStatus").textContent = text;
    }

    async function apiGet(path) {
      const res = await fetch(`${API_BASE}${path}`);
      if (!res.ok) throw new Error(`GET ${path}: ${res.status}`);
      return res.json();
    }

    async function apiPost(path, body) {
      const res = await fetch(`${API_BASE}${path}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: body ? JSON.stringify(body) : null
      });
      if (!res.ok) throw new Error(`POST ${path}: ${res.status}`);
      return res.json();
    }

    function renderMetrics(latestMap) {
      const ids = ["my_factory_factoryA", "my_factory_factoryB", "my_factory_factoryC", "my_factory_factoryD"];
      const labels = ["Factory A", "Factory B", "Factory C", "Factory D"];
      const root = document.getElementById("metrics");
      root.innerHTML = "";
      ids.forEach((id, i) => {
        const val = latestMap[id];
        const el = document.createElement("div");
        el.className = "metric";
        el.innerHTML = `<div class="k">${labels[i]}</div><div class="v">${Number.isFinite(val) ? Math.round(val) : "-"}</div>`;
        root.appendChild(el);
      });
    }

    function toChartData(seriesRows) {
      const endMs = Date.now();
      const startMs = endMs - lookbackMin * 60 * 1000;
      const bucketSec = lookbackMin <= 1 ? 1 : (lookbackMin <= 5 ? 3 : 10);
      const BUCKET_MS = bucketSec * 1000;
      const byThing = {};
      const labels = [];
      for (let t = startMs - (startMs % BUCKET_MS); t <= endMs; t += BUCKET_MS) {
        labels.push(new Date(t).toISOString());
      }
      seriesRows.forEach((row) => {
        const tMs = new Date(row.time).getTime();
        if (!Number.isFinite(tMs)) return;
        if (tMs < startMs || tMs > endMs + BUCKET_MS) return;
        const bucketIso = new Date(Math.floor(tMs / BUCKET_MS) * BUCKET_MS).toISOString();
        if (!byThing[row.thingId]) byThing[row.thingId] = {};
        byThing[row.thingId][bucketIso] = row.count;
      });

      const colors = {
        my_factory_factoryA: "#00d4ff",
        my_factory_factoryB: "#ffb700",
        my_factory_factoryC: "#00ff88",
        my_factory_factoryD: "#a855f7"
      };
      const datasets = Object.keys(byThing).map((thingId) => ({
        label: thingId.replace("my_factory_", ""),
        data: (() => {
          let lastVal = null;
          return labels.map((t) => {
            const v = byThing[thingId][t];
            if (v != null) lastVal = v;
            return lastVal;
          });
        })(),
        borderColor: colors[thingId] || "#7a9bbf",
        pointRadius: 0,
        spanGaps: true,
        borderWidth: 1.6,
        tension: 0.3
      }));
      const latestMap = {};
      Object.keys(byThing).forEach((thingId) => {
        for (let i = labels.length - 1; i >= 0; i -= 1) {
          const v = byThing[thingId][labels[i]];
          if (v != null) { latestMap[thingId] = v; break; }
        }
      });
      return { labels, datasets, latestMap };
    }

    async function loadInventory() {
      try {
        const payload = await apiGet(`/ui-api/inventory?lookback_min=${lookbackMin}`);
        const rows = Array.isArray(payload.series) ? payload.series : [];
        const { labels, datasets, latestMap } = toChartData(rows);
        chart.data.labels = labels;
        chart.data.datasets = datasets;
        chart.update();
        renderMetrics(latestMap);
      } catch (err) {
        console.error(err);
      }
    }

    async function loadRuntimeStatus() {
      try {
        const s = await apiGet("/ui-api/runtime/status");
        document.getElementById("watcherState").textContent = `Watcher: ${s.watcher.running ? "running" : "stopped"}`;
        document.getElementById("consumerState").textContent = `Consumer: ${s.consumer.running ? "running" : "stopped"}`;
        document.getElementById("simulationState").textContent = `Simulation: ${s.simulation.running ? "running" : "stopped"}`;
        document.getElementById("simCfgPath").textContent = `cfg: ${s.cfg}`;
        document.getElementById("simJarPath").textContent = `jar: ${s.jar}`;
      } catch (err) {
        console.error(err);
      }
    }

    async function loadLogs() {
      try {
        const w = await apiGet("/ui-api/runtime/logs/watcher?lines=60");
        const c = await apiGet("/ui-api/runtime/logs/consumer?lines=60");
        document.getElementById("watcherLog").textContent = w.text || "(empty)";
        document.getElementById("consumerLog").textContent = c.text || "(empty)";
      } catch (err) {
        console.error(err);
      }
    }

    function parseEvery(flux) {
      const m = String(flux || "").match(/every:\s*([^\s,\n]+)/);
      return m ? m[1] : "-";
    }

    async function loadTasks() {
      try {
        const payload = await apiGet("/ui-api/tasks");
        const list = (payload.data || {}).tasks || [];
        const root = document.getElementById("taskList");
        root.innerHTML = "";
        if (!list.length) {
          root.innerHTML = '<div class="line">No tasks found.</div>';
          return;
        }
        for (const task of list) {
          const card = document.createElement("div");
          card.className = "task-card";
          const id = String(task.id || "-");
          card.innerHTML = `
            <div class="task-title">${task.name || "unnamed-task"}</div>
            <div class="task-meta">id: ${id}</div>
            <div class="task-meta">status: ${task.status || "-"} | every: ${parseEvery(task.flux)}</div>
            <div class="task-actions">
              <button class="btn success">Enable</button>
              <button class="btn danger">Disable</button>
            </div>
          `;
          const [enableBtn, disableBtn] = card.querySelectorAll("button");
          enableBtn.onclick = async () => { await apiPost(`/ui-api/tasks/${id}/active`); await loadTasks(); };
          disableBtn.onclick = async () => { await apiPost(`/ui-api/tasks/${id}/inactive`); await loadTasks(); };
          root.appendChild(card);
        }
      } catch (err) {
        console.error(err);
      }
    }

    function renderPendingBox(proposal) {
      const box = document.getElementById("pendingBox");
      if (!proposal || !proposal.can_fix) {
        box.classList.remove("visible");
        box.innerHTML = "";
        pendingBranchProposal = null;
        return;
      }
      pendingBranchProposal = proposal;
      box.classList.add("visible");
      box.innerHTML = `
        <div>Pending branch change: ${proposal.branch_key}: ${proposal.current_value} -> ${proposal.recommended_value}</div>
        <div style="margin-top:4px;color:var(--muted)">${proposal.reason || "-"}</div>
        <div class="pending-actions">
          <button class="btn success" id="pendingApprove">Approve</button>
          <button class="btn danger" id="pendingReject">Reject</button>
        </div>
      `;
      document.getElementById("pendingApprove").onclick = async () => {
        try {
          const out = await apiPost("/ui-api/branch/apply", { proposal });
          if (out.ok) {
            const r = out.result || {};
            addMessage("ai", `Branch updated: ${r.branch_key} ${r.old_value} -> ${r.new_value}`);
          } else {
            addMessage("ai", `Branch apply failed: ${JSON.stringify(out.result || {})}`);
          }
        } catch (err) {
          addMessage("ai", `Branch apply error: ${err.message}`);
        } finally {
          renderPendingBox(null);
        }
      };
      document.getElementById("pendingReject").onclick = () => {
        addMessage("ai", "Branch change cancelled.");
        renderPendingBox(null);
      };
    }

    async function sendQuery() {
      const input = document.getElementById("chatInput");
      const text = input.value.trim();
      if (!text) return;
      addMessage("user", text);
      input.value = "";
      setChatInputExpanded(false);
      try {
        let body = { text };
        if ((text.startsWith("{") && text.endsWith("}")) || (text.startsWith("[") && text.endsWith("]"))) {
          try { body = { text, event: JSON.parse(text) }; } catch (_) {}
        }
        const payload = await apiPost("/ui-api/analyze", body);
        addMessage("ai", payload.answer || "(empty answer)");
        renderPendingBox(payload.branch_fix_proposal || null);
      } catch (err) {
        addMessage("ai", `Analyze failed: ${err.message}`);
      }
    }

    function setChatInputExpanded(expanded) {
      const wrap = document.getElementById("chatInputWrap");
      const input = document.getElementById("chatInput");
      chatExpanded = expanded;
      wrap.classList.toggle("expanded", expanded);
      if (expanded) {
        input.style.height = "auto";
        input.style.height = `${Math.min(180, input.scrollHeight)}px`;
      } else {
        input.style.height = "";
      }
    }

    async function syncIncidents() {
      if (!autoSyncEnabled) return;
      try {
        const payload = await apiGet("/ui-api/incidents?limit=10");
        const items = payload.items || [];
        if (items.length) {
          const top = items[0];
          setApiStatus(`API: connected | latest incident #${top.id}`);
        } else {
          setApiStatus("API: connected | no incidents");
        }
      } catch (err) {
        setApiStatus("API: disconnected");
      }
    }

    function bindRuntimeButtons() {
      document.getElementById("startWatcherBtn").onclick = async () => { addMessage("ai", (await apiPost("/ui-api/runtime/watcher/start")).message); loadRuntimeStatus(); };
      document.getElementById("stopWatcherBtn").onclick = async () => { addMessage("ai", (await apiPost("/ui-api/runtime/watcher/stop")).message); loadRuntimeStatus(); };
      document.getElementById("startConsumerBtn").onclick = async () => { addMessage("ai", (await apiPost("/ui-api/runtime/consumer/start")).message); loadRuntimeStatus(); };
      document.getElementById("stopConsumerBtn").onclick = async () => { addMessage("ai", (await apiPost("/ui-api/runtime/consumer/stop")).message); loadRuntimeStatus(); };
      document.getElementById("resetPipelineBtn").onclick = async () => {
        const out = await apiPost("/ui-api/runtime/reset-pipeline");
        addMessage("ai", `Pipeline reset complete. Removed files: ${(out.removed || []).length}`);
        loadRuntimeStatus();
      };
      document.getElementById("startSimBtn").onclick = async () => { addMessage("ai", (await apiPost("/ui-api/runtime/simulation/start")).message); loadRuntimeStatus(); };
      document.getElementById("stopSimBtn").onclick = async () => { addMessage("ai", (await apiPost("/ui-api/runtime/simulation/stop")).message); loadRuntimeStatus(); };
      document.getElementById("purgeInfluxBtn").onclick = async () => {
        const out = await apiPost("/ui-api/runtime/purge-influx");
        document.getElementById("purgeOut").textContent = `ok=${out.ok}\n${out.stdout || ""}\n${out.stderr || ""}`.trim();
      };
      document.getElementById("clearChatBtn").onclick = () => {
        renderChatEmptyState();
        renderPendingBox(null);
      };
      autoSyncCheckbox.onchange = () => { autoSyncEnabled = autoSyncCheckbox.checked; };
      rangeSelect.onchange = async () => {
        lookbackMin = Number(rangeSelect.value) || 5;
        await loadInventory();
      };
      document.getElementById("sendBtn").onclick = sendQuery;
      document.getElementById("chatInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendQuery();
        }
      });
      document.getElementById("chatInput").addEventListener("focus", () => {
        setChatInputExpanded(true);
      });
      document.getElementById("chatInput").addEventListener("blur", () => {
        const input = document.getElementById("chatInput");
        if (!input.value.trim()) setChatInputExpanded(false);
      });
      document.getElementById("chatInput").addEventListener("input", () => {
        if (!chatExpanded) return;
        const input = document.getElementById("chatInput");
        input.style.height = "auto";
        input.style.height = `${Math.min(180, input.scrollHeight)}px`;
      });
    }

    function bindTabs() {
      document.querySelectorAll(".tab").forEach((tab) => {
        tab.onclick = () => {
          document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          const key = tab.dataset.tab;
          document.querySelectorAll(".view").forEach((v) => v.classList.remove("active"));
          document.getElementById(`view-${key}`).classList.add("active");
          if (key === "task") loadTasks();
        };
      });
    }

    async function init() {
      bindRuntimeButtons();
      bindTabs();
      addMessage("ai", "New frontend initialized. All controls are API-backed.");
      await loadRuntimeStatus();
      await loadInventory();
      await loadLogs();
      await syncIncidents();
      setInterval(loadInventory, 5000);
      setInterval(loadLogs, 5000);
      setInterval(loadRuntimeStatus, 3000);
      setInterval(syncIncidents, 3000);
    }

    init();
  </script>
</body>
</html>
