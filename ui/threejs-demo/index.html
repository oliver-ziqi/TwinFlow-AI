<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Logistics Twin Demo</title>
  <style>
    :root {
      --bg: #eef2f7;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #d9e2ec;
      --line-axis: #94a3b8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at 10% 10%, #f8fafc 0%, var(--bg) 45%, #e2e8f0 100%);
      color: var(--text);
    }
    .wrap {
      width: min(1200px, 96vw);
      margin: 16px auto;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 12px;
      transition: grid-template-columns 0.2s ease, gap 0.2s ease;
    }
    .wrap.collapsed {
      grid-template-columns: 1fr 0;
      gap: 0;
    }
    .stage, .panel {
      background: var(--panel);
      border: 1px solid #dbe5ef;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }
    .stage { min-height: 80vh; position: relative; }
    .stage-toolbar {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 5;
      display: flex;
      gap: 8px;
    }
    .stage-toolbar button {
      background: rgba(248, 250, 252, 0.92);
      backdrop-filter: blur(3px);
      font-size: 12px;
      padding: 6px 10px;
    }
    #view { width: 100%; height: 100%; }
    .panel { padding: 14px; }
    .wrap.collapsed .panel {
      border: 0;
      padding: 0;
      opacity: 0;
      pointer-events: none;
    }
    .row { margin-bottom: 10px; }
    .title { margin: 0 0 8px; font-size: 16px; }
    .muted { color: var(--muted); font-size: 12px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .kv { font-size: 13px; line-height: 1.6; }
    button {
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 8px 10px;
      background: #f8fafc;
      cursor: pointer;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #e2e8f0;
      font-size: 12px;
    }
    @media (max-width: 1024px) {
      .wrap { width: 98vw; grid-template-columns: 1fr; }
      .panel { order: 2; }
      .stage { order: 1; min-height: 68vh; }
      .wrap.collapsed .panel { display: none; }
    }
  </style>
</head>
<body>
  <div class="wrap" id="layoutWrap">
    <div class="stage">
      <div class="stage-toolbar">
        <button id="togglePanel">Hide Input Panel</button>
      </div>
      <canvas id="view"></canvas>
    </div>
    <aside class="panel">
      <h3 class="title">Three.js Twin Demo</h3>
      <div class="row muted">50 x 50 panel, origin at center</div>
      <div class="row">
        <label class="muted" for="ws">WS URL</label>
        <input id="ws" value="ws://192.168.17.128:8080/ws/2" />
        <label class="muted" for="subscribe">Subscribe</label>
        <input id="subscribe" value="events" />
        <label class="muted" for="user">Username (optional)</label>
        <input id="user" value="ditto" />
        <label class="muted" for="pass">Password (optional)</label>
        <input id="pass" type="password" value="ditto" />
        <label class="muted" for="token">access_token query (optional)</label>
        <input id="token" value="" />
        <button id="connect">Connect</button>
        <button id="mock">Mock On/Off</button>
      </div>
      <div class="row kv">
        <div>Connection: <span id="conn" class="badge">idle</span></div>
        <div>Interpolation delay: <strong>450ms</strong></div>
        <div>Packets: <span id="pktCount">0</span></div>
        <div>Last packet age: <span id="pktAge">-</span></div>
      </div>
      <div class="row kv">
        <div><span class="dot" style="background:#0A6EBD"></span>car1: <span id="car1">-</span></div>
        <div><span class="dot" style="background:#16A34A"></span>car2: <span id="car2">-</span></div>
        <div><span class="dot" style="background:#EF4444"></span>car3: <span id="car3">-</span></div>
      </div>
      <div class="row muted">
        WS message 只更新目标快照；画面在渲染循环内做插值，不会到包就跳点。
      </div>
    </aside>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.167.1/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "https://unpkg.com/three@0.167.1/examples/jsm/controls/OrbitControls.js";

    const AXIS_MIN = -25;
    const AXIS_MAX = 25;
    const WORLD_SCALE = 1.7;
    const SOURCE_PUBLISH_INTERVAL_MS = 500;
    const INTERPOLATION_DELAY_MS = Math.floor(SOURCE_PUBLISH_INTERVAL_MS * 0.9);
    const RENDER_INTERVAL_MS = 33;
    const MAX_SNAPSHOTS = 120;
    const MAX_EXTRAPOLATION_MS = 1500;
    const UPSAMPLE_INTERVAL_MS = 50; // 20Hz synthetic snapshots between sparse WS updates
    const MAX_UPSAMPLE_GAP_MS = 2000;
    const FACTORIES = [
      { id: "A", x: -17.2, y: 3.8, color: 0x7c3aed },
      { id: "B", x: 4.7, y: 2.1, color: 0x0ea5e9 },
      { id: "C", x: -12.3, y: -14.4, color: 0x16a34a },
      { id: "D", x: 3.5, y: -14.4, color: 0xf97316 }
    ];
    const LOGISTICS_CONFIG = {
      logistics_edges: [
        { id: "e1", to: "fb", from: "fa", branch: "ba", products: ["p1"], branch_value: 1 },
        { id: "e2", to: "fc", from: "fa", branch: "ba", products: ["p1"], branch_value: 2 },
        { id: "e3", to: "fc", from: "fb", branch: "bb", products: ["p2"], branch_value: 1 },
        { id: "e4", to: "fd", from: "fb", branch: "bb", products: ["p12"], branch_value: 2 },
        { id: "e5", to: "fd", from: "fc", branch: "bc", products: ["p23"], branch_value: 1 }
      ]
    };
    const FACTORY_CODE_TO_ID = { fa: "A", fb: "B", fc: "C", fd: "D" };

    const cars = {
      car1: { color: 0x0A6EBD, mesh: null, snapshots: [] },
      car2: { color: 0x16A34A, mesh: null, snapshots: [] },
      car3: { color: 0xEF4444, mesh: null, snapshots: [] }
    };
    const carTextCache = { car1: "", car2: "", car3: "" };

    const canvas = document.getElementById("view");
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    function toWorldX(simX) {
      return simX * WORLD_SCALE;
    }

    function toWorldZ(simY) {
      return -simY * WORLD_SCALE;
    }

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf8fafc);

    const camera = new THREE.PerspectiveCamera(45, 16 / 9, 0.1, 500);
    camera.position.set(0, 42 * WORLD_SCALE, 42 * WORLD_SCALE);
    camera.lookAt(0, 0, 0);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableZoom = true;
    controls.enablePan = true;
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 0, 0);
    controls.maxPolarAngle = Math.PI * 0.495;
    controls.minDistance = 12 * WORLD_SCALE;
    controls.maxDistance = 130 * WORLD_SCALE;
    controls.mouseButtons.LEFT = THREE.MOUSE.PAN;
    controls.mouseButtons.RIGHT = THREE.MOUSE.ROTATE;
    controls.update();

    scene.add(new THREE.AmbientLight(0xffffff, 0.85));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.65);
    dirLight.position.set(8, 18, 12);
    scene.add(dirLight);

    const grid = new THREE.GridHelper((AXIS_MAX - AXIS_MIN) * WORLD_SCALE, 10, 0x94a3b8, 0xd9e2ec);
    scene.add(grid);

    const xAxis = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(toWorldX(AXIS_MIN), 0.01, 0), new THREE.Vector3(toWorldX(AXIS_MAX), 0.01, 0)]),
      new THREE.LineBasicMaterial({ color: 0x334155 })
    );
    scene.add(xAxis);

    const zAxis = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0.01, toWorldX(AXIS_MIN)), new THREE.Vector3(0, 0.01, toWorldX(AXIS_MAX))]),
      new THREE.LineBasicMaterial({ color: 0x334155 })
    );
    scene.add(zAxis);

    // Create a billboard label sprite used for factories and path annotations.
    function createLabelSprite(text) {
      const c = document.createElement("canvas");
      c.width = 256;
      c.height = 96;
      const ctx = c.getContext("2d");
      ctx.fillStyle = "rgba(15,23,42,0.85)";
      if (typeof ctx.roundRect === "function") {
        ctx.roundRect(8, 12, 240, 72, 14);
        ctx.fill();
      } else {
        ctx.fillRect(8, 12, 240, 72);
      }
      ctx.fillStyle = "#f8fafc";
      ctx.font = "bold 40px Segoe UI";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, 128, 48);
      const texture = new THREE.CanvasTexture(c);
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(5, 1.8, 1);
      return sprite;
    }

    // Build one factory node with a small building-like structure and place it on XY plane (X/Z in Three.js).
    function addFactoryNode(factory) {
      const group = new THREE.Group();

      const base = new THREE.Mesh(
        new THREE.BoxGeometry(4.4, 0.4, 4.0),
        new THREE.MeshStandardMaterial({ color: 0x475569, roughness: 0.8, metalness: 0.05 })
      );
      base.position.y = 0.2;
      group.add(base);

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(3.4, 2.1, 2.8),
        new THREE.MeshStandardMaterial({ color: factory.color, roughness: 0.52, metalness: 0.1 })
      );
      body.position.y = 1.45;
      group.add(body);

      const roof = new THREE.Mesh(
        new THREE.ConeGeometry(2.3, 1.0, 4),
        new THREE.MeshStandardMaterial({ color: 0x1f2937, roughness: 0.6, metalness: 0.08 })
      );
      roof.rotation.y = Math.PI * 0.25;
      roof.position.y = 3.0;
      group.add(roof);

      const chimney = new THREE.Mesh(
        new THREE.CylinderGeometry(0.22, 0.28, 1.9, 16),
        new THREE.MeshStandardMaterial({ color: 0xe2e8f0, roughness: 0.45, metalness: 0.2 })
      );
      chimney.position.set(1.0, 3.35, -0.8);
      group.add(chimney);

      const smokeCap = new THREE.Mesh(
        new THREE.SphereGeometry(0.18, 14, 14),
        new THREE.MeshStandardMaterial({ color: 0xcbd5e1, roughness: 0.5, metalness: 0.05 })
      );
      smokeCap.position.set(1.0, 4.3, -0.8);
      group.add(smokeCap);

      const windowMat = new THREE.MeshStandardMaterial({ color: 0xbfdbfe, roughness: 0.25, metalness: 0.35 });
      for (let i = -1; i <= 1; i += 1) {
        const win = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.46, 0.05), windowMat);
        win.position.set(i * 0.95, 1.55, 1.42);
        group.add(win);
      }

      const label = createLabelSprite(`Factory ${factory.id}`);
      label.position.set(0, 5.2, 0);
      group.add(label);

      group.position.set(toWorldX(factory.x), 0, toWorldZ(factory.y));
      scene.add(group);
    }

    // Build a procedural forklift-like mesh so no external model is required.
    function createForkliftMesh(colorHex) {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(2.2, 0.7, 1.4),
        new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.45, metalness: 0.12 })
      );
      body.position.y = 0.85;
      group.add(body);

      const counterWeight = new THREE.Mesh(
        new THREE.BoxGeometry(0.5, 0.55, 1.2),
        new THREE.MeshStandardMaterial({ color: 0x1f2937, roughness: 0.55, metalness: 0.08 })
      );
      counterWeight.position.set(-1.3, 0.8, 0);
      group.add(counterWeight);

      const cabin = new THREE.Mesh(
        new THREE.BoxGeometry(0.9, 0.75, 1.0),
        new THREE.MeshStandardMaterial({ color: 0xdbeafe, roughness: 0.2, metalness: 0.35, transparent: true, opacity: 0.85 })
      );
      cabin.position.set(-0.2, 1.35, 0);
      group.add(cabin);

      const mastLeft = new THREE.Mesh(
        new THREE.BoxGeometry(0.1, 1.55, 0.1),
        new THREE.MeshStandardMaterial({ color: 0x111827, roughness: 0.45, metalness: 0.28 })
      );
      mastLeft.position.set(0.95, 1.35, -0.32);
      group.add(mastLeft);

      const mastRight = mastLeft.clone();
      mastRight.position.z = 0.32;
      group.add(mastRight);

      const forkBar = new THREE.Mesh(
        new THREE.BoxGeometry(0.12, 0.12, 0.72),
        new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: 0.4, metalness: 0.3 })
      );
      forkBar.position.set(1.15, 0.72, 0);
      group.add(forkBar);

      for (const z of [-0.2, 0.2]) {
        const fork = new THREE.Mesh(
          new THREE.BoxGeometry(0.72, 0.07, 0.1),
          new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: 0.35, metalness: 0.35 })
        );
        fork.position.set(1.5, 0.47, z);
        group.add(fork);
      }

      const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111827, roughness: 0.75, metalness: 0.02 });
      const wheelGeo = new THREE.CylinderGeometry(0.24, 0.24, 0.2, 16);
      for (const [x, z] of [[-0.85, -0.62], [-0.85, 0.62], [0.75, -0.62], [0.75, 0.62]]) {
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.rotation.z = Math.PI * 0.5;
        wheel.position.set(x, 0.28, z);
        group.add(wheel);
      }

      return group;
    }

    // Build a straight road segment between two factories.
    function createStraightRoad(fromPos, toPos) {
      const p0 = new THREE.Vector3(toWorldX(fromPos.x), 0.06, toWorldZ(fromPos.y));
      const p1 = new THREE.Vector3(toWorldX(toPos.x), 0.06, toWorldZ(toPos.y));
      return { p0, p1 };
    }

    // Render one logistics route: straight gray road, dashed center line, and edge label.
    function addLogisticsPath(edge) {
      const fromId = FACTORY_CODE_TO_ID[edge.from];
      const toId = FACTORY_CODE_TO_ID[edge.to];
      const fromPos = FACTORIES.find((f) => f.id === fromId);
      const toPos = FACTORIES.find((f) => f.id === toId);
      if (!fromPos || !toPos) return;

      const { p0, p1 } = createStraightRoad(fromPos, toPos);
      const dx = p1.x - p0.x;
      const dz = p1.z - p0.z;
      const len = Math.hypot(dx, dz) || 1;
      const roadWidth = 1.4;
      const roadThickness = 0.04;
      const heading = Math.atan2(dz, dx);

      const road = new THREE.Mesh(
        new THREE.BoxGeometry(len, roadThickness, roadWidth),
        new THREE.MeshStandardMaterial({ color: 0x4b5563, roughness: 0.92, metalness: 0.02 })
      );
      road.rotation.y = -heading;
      road.position.set((p0.x + p1.x) * 0.5, 0.02, (p0.z + p1.z) * 0.5);
      scene.add(road);

      const dir = new THREE.Vector3(dx, 0, dz).normalize();
      const inset = 0.55;
      const lineStart = new THREE.Vector3(p0.x, 0.08, p0.z).addScaledVector(dir, inset);
      const lineEnd = new THREE.Vector3(p1.x, 0.08, p1.z).addScaledVector(dir, -inset);
      const centerLine = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([
          lineStart,
          lineEnd
        ]),
        new THREE.LineDashedMaterial({ color: 0xf8fafc, dashSize: 0.95, gapSize: 0.7, linewidth: 1 })
      );
      centerLine.computeLineDistances();
      scene.add(centerLine);

      const mid = new THREE.Vector3((p0.x + p1.x) * 0.5, 0.08, (p0.z + p1.z) * 0.5);
      const label = createLabelSprite(`${edge.id}: ${edge.products.join("+")} (${edge.branch})`);
      label.scale.set(6.6, 1.65, 1);
      label.position.set(mid.x, 2.15, mid.z);
      scene.add(label);
    }

    for (const factory of FACTORIES) {
      addFactoryNode(factory);
    }
    for (const edge of LOGISTICS_CONFIG.logistics_edges) {
      addLogisticsPath(edge);
    }

    for (const [id, car] of Object.entries(cars)) {
      const mesh = createForkliftMesh(car.color);
      mesh.position.set(0, 0, 0);
      scene.add(mesh);
      car.mesh = mesh;
      pushSnapshot(id, { x: 0, y: 0, ts: performance.now() });
      document.getElementById(id).textContent = "(0.00, 0.00)";
    }

    // Keep renderer and camera aspect in sync with container size.
    function resize() {
      const rect = canvas.parentElement.getBoundingClientRect();
      renderer.setSize(rect.width, rect.height, false);
      camera.aspect = rect.width / rect.height;
      camera.updateProjectionMatrix();
    }
    window.addEventListener("resize", resize);
    resize();

    // Clamp a value into [min, max].
    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    // Append a position snapshot to a car buffer and keep only recent frames.
    function pushSnapshot(carId, sample) {
      const car = cars[carId];
      if (!car) return;
      car.snapshots.push(sample);
      if (car.snapshots.length > MAX_SNAPSHOTS) {
        car.snapshots.shift();
      }
    }

    // Compute smooth position at renderTime via interpolation; short extrapolation on temporary gaps.
    function getInterpolatedPosition(car, renderTime) {
      const s = car.snapshots;
      if (!s.length) return { x: 0, y: 0 };
      if (s.length === 1) return { x: s[0].x, y: s[0].y };

      let left = s[0];
      let right = s[s.length - 1];
      for (let i = 0; i < s.length - 1; i += 1) {
        if (s[i].ts <= renderTime && renderTime <= s[i + 1].ts) {
          left = s[i];
          right = s[i + 1];
          const span = Math.max(1, right.ts - left.ts);
          const t = clamp((renderTime - left.ts) / span, 0, 1);
          return {
            x: left.x + (right.x - left.x) * t,
            y: left.y + (right.y - left.y) * t
          };
        }
      }

      const last = s[s.length - 1];
      const prev = s[s.length - 2];
      const dt = last.ts - prev.ts;
      const age = renderTime - last.ts;
      if (dt > 0 && age > 0 && age < MAX_EXTRAPOLATION_MS) {
        const vx = (last.x - prev.x) / dt;
        const vy = (last.y - prev.y) / dt;
        return { x: last.x + vx * age, y: last.y + vy * age };
      }
      return { x: last.x, y: last.y };
    }

    // Parse Ditto event payload and extract {carId, x, y} for car1~car3.
    function parseDitto(payload) {
      const topic = String(payload?.topic || "");
      const m = topic.match(/my\.logistics\/(car[123])\//);
      if (!m) return null;
      const carId = m[1];
      const pos = payload?.value?.features?.status?.properties?.position;
      if (!pos) return null;
      const x = Number(pos.x);
      const y = Number(pos.y);
      if (!Number.isFinite(x) || !Number.isFinite(y)) return null;
      return { carId, x, y, ts: Date.now() };
    }

    // Normalize and store one incoming sample for a given car.
    // If WS updates are sparse (e.g. ~1Hz), insert synthetic snapshots at 10Hz to smooth motion.
    function onCarSample(carId, x, y, tsMs) {
      const nextX = clamp(x, AXIS_MIN, AXIS_MAX);
      const nextY = clamp(y, AXIS_MIN, AXIS_MAX);
      const car = cars[carId];
      if (!car) return;

      const snapshots = car.snapshots;
      const prev = snapshots.length ? snapshots[snapshots.length - 1] : null;
      if (!prev) {
        pushSnapshot(carId, { x: nextX, y: nextY, ts: tsMs });
        return;
      }

      const gapMs = Math.max(1, tsMs - prev.ts);
      const cappedGapMs = Math.min(gapMs, MAX_UPSAMPLE_GAP_MS);
      const steps = Math.max(1, Math.floor(cappedGapMs / UPSAMPLE_INTERVAL_MS));

      for (let i = 1; i <= steps; i += 1) {
        const t = i / steps;
        pushSnapshot(carId, {
          x: prev.x + (nextX - prev.x) * t,
          y: prev.y + (nextY - prev.y) * t,
          ts: prev.ts + cappedGapMs * t
        });
      }

      if (cappedGapMs !== gapMs) {
        pushSnapshot(carId, { x: nextX, y: nextY, ts: tsMs });
      }
    }

    // Render one frame on a fixed timer (~30fps).
    function renderFrame(now) {
      const renderTime = now - INTERPOLATION_DELAY_MS;
      for (const [id, car] of Object.entries(cars)) {
        const p = getInterpolatedPosition(car, renderTime);
        car.mesh.position.x = toWorldX(p.x);
        car.mesh.position.z = toWorldZ(p.y);
        const text = `(${p.x.toFixed(2)}, ${p.y.toFixed(2)})`;
        if (carTextCache[id] !== text) {
          carTextCache[id] = text;
          document.getElementById(id).textContent = text;
        }
      }
      controls.update();
      renderer.render(scene, camera);
    }
    setInterval(() => renderFrame(performance.now()), RENDER_INTERVAL_MS);

    const connTag = document.getElementById("conn");
    const pktCountTag = document.getElementById("pktCount");
    const pktAgeTag = document.getElementById("pktAge");
    const wsInput = document.getElementById("ws");
    const subscribeInput = document.getElementById("subscribe");
    const userInput = document.getElementById("user");
    const passInput = document.getElementById("pass");
    const tokenInput = document.getElementById("token");
    let socket = null;
    let mockTimer = null;
    let packetCount = 0;
    let lastPacketAt = 0;
    const layoutWrap = document.getElementById("layoutWrap");
    const togglePanelBtn = document.getElementById("togglePanel");

    // Update connection status badge in the side panel.
    function setConn(text) {
      connTag.textContent = text;
    }

    function markPacket() {
      packetCount += 1;
      lastPacketAt = performance.now();
      pktCountTag.textContent = String(packetCount);
    }

    // Map subscribe mode to Ditto websocket command.
    function buildSubscribeMessage() {
      const mode = (subscribeInput.value || "events").trim();
      const mapping = {
        "events": "START-SEND-EVENTS",
        "messages": "START-SEND-MESSAGES",
        "live-commands": "START-SEND-LIVE-COMMANDS",
        "live-events": "START-SEND-LIVE-EVENTS",
        "policy-announcements": "START-SEND-POLICY-ANNOUNCEMENTS"
      };
      return mapping[mode] || "START-SEND-EVENTS";
    }

    // Build browser-friendly WS URL; supports URL userinfo and access_token query fallback.
    function buildWsUrlForBrowser() {
      const rawUrl = wsInput.value.trim();
      const url = new URL(rawUrl);
      const user = (userInput.value || "").trim();
      const pass = passInput.value || "";
      const token = (tokenInput.value || "").trim();

      // Browser cannot set custom Authorization header like Python websockets.
      // Fallbacks: URL userinfo or access_token query.
      if (user && pass) {
        url.username = user;
        url.password = pass;
      }
      if (token) {
        url.searchParams.set("access_token", token);
      }
      return url.toString();
    }

    // Open websocket, send subscribe command on connect, and feed snapshots on message.
    function connectWS() {
      if (socket) socket.close();
      try {
        socket = new WebSocket(buildWsUrlForBrowser());
      } catch (e) {
        setConn("connect error");
        return;
      }

      socket.onopen = () => {
        setConn("connected");
        socket.send(buildSubscribeMessage());
      };
      socket.onclose = () => setConn("closed");
      socket.onerror = () => setConn("ws error");
      socket.onmessage = (ev) => {
        try {
          const payload = JSON.parse(ev.data);
          const data = parseDitto(payload);
          if (!data) return;
          markPacket();
          onCarSample(data.carId, data.x, data.y, performance.now());
        } catch (_) {
          // Ignore non-json frames.
        }
      };
    }

    // Toggle local mock data source to test animation without backend WS.
    function toggleMock() {
      if (mockTimer) {
        clearInterval(mockTimer);
        mockTimer = null;
        return;
      }
      setConn("mock");
      let t = 0;
      mockTimer = setInterval(() => {
        t += 0.18;
        markPacket();
        onCarSample("car1", 12 * Math.cos(t), 12 * Math.sin(t), performance.now());
        onCarSample("car2", -10 + 8 * Math.cos(t * 0.7), 9 * Math.sin(t * 0.7), performance.now());
        onCarSample("car3", -6 + 10 * Math.cos(t * 0.4), -8 + 6 * Math.sin(t * 0.4), performance.now());
      }, 100);
    }

    setInterval(() => {
      if (!lastPacketAt) {
        pktAgeTag.textContent = "-";
        return;
      }
      const ageMs = Math.max(0, performance.now() - lastPacketAt);
      pktAgeTag.textContent = `${Math.round(ageMs)} ms`;
    }, 200);

    function togglePanel() {
      const collapsed = layoutWrap.classList.toggle("collapsed");
      togglePanelBtn.textContent = collapsed ? "Show Input Panel" : "Hide Input Panel";
      setTimeout(resize, 220);
    }

    togglePanelBtn.addEventListener("click", togglePanel);
    document.getElementById("connect").addEventListener("click", connectWS);
    document.getElementById("mock").addEventListener("click", toggleMock);
  </script>
</body>
</html>
